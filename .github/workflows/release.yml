name: Build and upload release assets

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            configure_preset: release-win
            build_preset: release-win
            archive_ext: zip

          - os: macos-latest
            platform: macos
            configure_preset: release-gnu
            build_preset: release-gnu
            archive_ext: tar.gz

    env:
      APP_NAME: cstr_adsorption

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@v3.28.0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: vcpkg.json

      - name: Configure and build
        uses: lukka/run-cmake@v10
        with:
          # This is the default path to the CMakeLists.txt along side the
          # CMakePresets.json. Change if you need have CMakeLists.txt and CMakePresets.json
          # located elsewhere.
          # cmakeListsTxtPath: '${{ github.workspace }}/CMakeLists.txt'

          # You could use CMake workflow presets defined in the CMakePresets.json
          # with just this line below. Note this one cannot be used with any other
          # preset input, it is mutually exclusive.
          # workflowPreset: 'workflow-name'

          # This is the name of the CMakePresets.json's configuration to use to generate
          # the project files. This configuration leverages the vcpkg.cmake toolchain file to
          # run vcpkg and install all dependencies specified in vcpkg.json.
          configurePreset: ${{ matrix.configure_preset }}
          # Additional arguments can be appended to the cmake command.
          # This is useful to reduce the number of CMake's Presets since you can reuse
          # an existing preset with different variables.
#          configurePresetAdditionalArgs: "['-DCMAKE_POLICY_VERSION_MINIMUM=3.5']"

          # This is the name of the CMakePresets.json's configuration to build the project.
          buildPreset: ${{ matrix.build_preset }}
          # Additional arguments can be appended when building, for example to specify the
          # configuration to build.
          # This is useful to reduce the number of CMake's Presets you need in CMakePresets.json.
#          buildPresetAdditionalArgs: "['--config Release']"

      - name: Prepare package directory (macos)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          PKG_DIR="${APP_NAME}_${{ matrix.platform }}"
          
          ./update_dist.sh
          
          mv dist "$PKG_DIR"

          echo "PKG_DIR=$PKG_DIR" >> "$GITHUB_ENV"

      - name: Prepare package directory (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $VERSION = "${{ github.event.release.tag_name }}"
          $PKG_DIR = "${env:APP_NAME}_${{ matrix.platform }}"
          
          ./update_dist.ps1
          
          Move-Item dist $env:PKG_DIR

          "PKG_DIR=$env:PKG_DIR" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create zip archive
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:PKG_DIR\*" -DestinationPath "$env:PKG_DIR.zip"
          echo "ASSET_PATH=$env:PKG_DIR.zip" >> $env:GITHUB_ENV

      - name: Create tar.gz archive
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          tar -czf "${PKG_DIR}.tar.gz" "${PKG_DIR}"
          echo "ASSET_PATH=${PKG_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET_PATH }}